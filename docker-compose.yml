services:
  api:
    build:
      context: .
      target: development        # Switch to "production" for prod builds
    container_name: express_api
    ports:
      - "3000:3000"              # host:container
    volumes:
      - .:/app                   # Hot-reload: mirror local files into container
      - /app/node_modules        # Keep container's node_modules isolated
    environment:
      - NODE_ENV=development
      - PORT=3000
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s